<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitty 聊天</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <div id="app-wrapper">

  <!-- 左侧常驻侧边面板 -->
  <aside id="status-side-panel">
    <div class="side-panel-header">
      <span class="side-panel-title" id="side-panel-title">Hello Kitty</span>
    </div>
    <div class="side-panel-scroll">
      <!-- 状态视图 (默认) -->
      <div class="side-view active" id="view-status">
        <div class="side-section side-owner-card">
          <div class="side-avatar"><img src="assets/avatar.jpeg" alt="HK"></div>
          <div class="side-owner-name" id="side-owner-name">新朋友</div>
          <div class="side-owner-greeting" id="side-greeting">欢迎回来~</div>
        </div>
        <div class="side-section side-mood-section">
          <div class="side-section-title">Kitty 心情</div>
          <div class="side-mood-display">
            <span class="side-mood-emoji" id="side-mood-emoji">😊</span>
            <span class="side-mood-text" id="side-mood-text">开心</span>
          </div>
        </div>
        <div class="side-section side-affinity-section">
          <div class="side-section-title">亲密度</div>
          <div class="side-affinity-header">
            <span id="side-level-name">--</span>
            <span id="side-affinity-num">0</span>
          </div>
          <div class="side-progress-bar">
            <div class="side-progress-fill" id="side-progress"></div>
          </div>
          <div class="side-progress-label" id="side-progress-label">--</div>
          <div class="side-next-level" id="side-next-level">--</div>
        </div>
        <div class="side-section side-stats-section">
          <div class="side-section-title">陪伴统计</div>
          <div class="side-stat-row">
            <span class="side-stat-label">相识天数</span>
            <span class="side-stat-value" id="side-days">--</span>
          </div>
          <div class="side-stat-row">
            <span class="side-stat-label">连续登录</span>
            <span class="side-stat-value" id="side-streak">--</span>
          </div>
        </div>
        <div class="side-section side-achievements-section">
          <div class="side-section-title">连续登录成就</div>
          <div class="side-achievements" id="side-achievements"></div>
        </div>
      </div>

      <!-- 玩耍视图 -->
      <div class="side-view" id="view-play">
        <div class="side-view-header">
          <button class="side-view-back" data-view="status" aria-label="返回"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <span class="side-view-title">玩耍</span>
        </div>
        <div class="play-grid">
          <button class="play-btn" data-action="feed" data-req="none"><svg class="play-icon-img" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FF6B9D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg><span class="play-label">喂食</span></button>
          <button class="play-btn" data-action="play" data-req="none"><svg class="play-icon-img" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FF6B9D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="#FF6B9D" stroke="none"/></svg><span class="play-label">玩耍</span></button>
          <button class="play-btn" data-action="heal" data-req="mood"><svg class="play-icon-img" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><span class="play-label">治疗</span></button>
          <button class="play-btn" data-action="pomodoro" data-req="none"><svg class="play-icon-img" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3L2 6"/><path d="M22 6l-3-3"/><path d="M12 5V3"/><path d="M10 2h4"/></svg><span class="play-label">专注</span></button>
          <button class="play-btn" data-action="sing" data-req="affinity3"><svg class="play-icon-img" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FF6B9D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><span class="play-label">唱歌</span></button>
          <button class="play-btn" data-action="skate" data-req="affinity3"><svg class="play-icon-img" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#42A5F5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 4h3a2 2 0 010 4h-3"/><path d="M4 8h13l-1.5 6H6L4.5 8z"/><circle cx="7" cy="18" r="2"/><circle cx="15" cy="18" r="2"/><line x1="4" y1="22" x2="20" y2="22"/></svg><span class="play-label">溜冰</span></button>
          <button class="play-btn" data-action="gift" data-req="affinity5"><svg class="play-icon-img" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FFB300" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg><span class="play-label">送礼物</span></button>
          <button class="play-btn" data-action="hug" data-req="affinity6"><svg class="play-icon-img" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FF6B9D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg><span class="play-label">抱抱</span></button>
          <button class="play-btn" data-action="secret" data-req="affinity8"><svg class="play-icon-img" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7B68EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg><span class="play-label">秘密</span></button>
        </div>
      </div>

      <!-- 日程视图 -->
      <div class="side-view" id="view-schedule">
        <div class="side-view-header">
          <button class="side-view-back" data-view="status" aria-label="返回"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <span class="side-view-title">每周日程</span>
        </div>
        <div class="day-selector">
          <button class="day-btn active" data-day="mon">一</button>
          <button class="day-btn" data-day="tue">二</button>
          <button class="day-btn" data-day="wed">三</button>
          <button class="day-btn" data-day="thu">四</button>
          <button class="day-btn" data-day="fri">五</button>
          <button class="day-btn" data-day="sat">六</button>
          <button class="day-btn" data-day="sun">日</button>
        </div>
        <div id="schedule-list"></div>
        <div class="schedule-add-row">
          <select id="schedule-hour"></select>
          <span class="time-sep">:</span>
          <select id="schedule-minute"></select>
          <input type="text" id="schedule-text" placeholder="日程内容" />
          <button id="schedule-add-btn" aria-label="添加日程">+</button>
        </div>
        <div class="schedule-actions">
          <button id="schedule-save">保存</button>
          <button id="schedule-cancel">取消</button>
        </div>
      </div>

      <!-- 待办视图 -->
      <div class="side-view" id="view-todo">
        <div class="side-view-header">
          <button class="side-view-back" data-view="status" aria-label="返回"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <span class="side-view-title">待办事项</span>
        </div>
        <div id="todo-list"></div>
        <div class="todo-add-row">
          <input type="text" id="todo-input" placeholder="添加新的待办事项..." />
          <button id="todo-add-btn" aria-label="添加待办">+</button>
        </div>
      </div>

      <!-- 设置视图 -->
      <div class="side-view" id="view-settings">
        <div class="side-view-header">
          <button class="side-view-back" data-view="status" aria-label="返回"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <span class="side-view-title">设置</span>
        </div>
        <div class="settings-content">
          <div class="settings-section">
            <div class="settings-section-title">主人信息</div>
            <div class="settings-row">
              <label>名字</label>
              <input type="text" id="settings-owner-name" placeholder="输入你的名字">
            </div>
            <div class="settings-row">
              <label>生日</label>
              <input type="text" id="settings-owner-birthday" placeholder="MM-DD 格式">
            </div>
            <button id="settings-save-owner" class="settings-save-btn">保存</button>
          </div>
          <div class="settings-section">
            <div class="settings-section-title">AI 设置</div>
            <div class="settings-row">
              <label>API Key</label>
              <input type="password" id="settings-api-key" placeholder="sk-...">
            </div>
            <button id="settings-save-ai" class="settings-save-btn">保存</button>
          </div>
          <div class="settings-section">
            <div class="settings-section-title">皮肤主题</div>
            <div class="skin-grid" id="skin-grid"></div>
          </div>
          <div class="settings-section">
            <div class="settings-section-title">聊天背景</div>
            <div class="bg-grid" id="bg-grid"></div>
            <div class="bg-opacity-row">
              <span class="bg-opacity-label">透明度</span>
              <input type="range" id="bg-opacity-slider" min="5" max="60" value="18" class="bg-opacity-slider">
              <span class="bg-opacity-value" id="bg-opacity-value">18%</span>
            </div>
          </div>
          <div class="settings-section">
            <div class="settings-section-title">软件更新</div>
            <div class="update-info">
              <div class="update-version-row">
                <span class="update-label">当前版本</span>
                <span class="update-version" id="update-current-version">--</span>
              </div>
              <div class="update-status-text" id="update-status-text">点击检查更新</div>
              <div class="update-release-notes hidden" id="update-release-notes"></div>
              <div class="update-progress-bar hidden" id="update-progress-bar">
                <div class="update-progress-fill" id="update-progress-fill"></div>
              </div>
              <div class="update-progress-pct hidden" id="update-progress-pct"></div>
            </div>
            <div class="update-actions">
              <button id="update-check-btn" class="settings-save-btn">检查更新</button>
              <button id="update-install-btn" class="settings-save-btn hidden">安装更新</button>
            </div>
            <div class="update-changelog-toggle">
              <button id="update-changelog-btn" class="update-link-btn">查看更新日志</button>
            </div>
            <div class="update-changelog-content hidden" id="update-changelog-content"></div>
          </div>
        </div>
      </div>

      <!-- 找朋友视图 -->
      <div class="side-view" id="view-friends">
        <div class="side-view-header">
          <button class="side-view-back" data-view="status" aria-label="返回"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <span class="side-view-title">找朋友</span>
        </div>
        <!-- 昵称设置 -->
        <div class="friends-section">
          <div class="friends-section-title">我的昵称</div>
          <div class="friends-nickname-row">
            <input type="text" id="friends-nickname-input" placeholder="给自己取个名字" maxlength="12">
            <button id="friends-nickname-save" class="friends-small-btn">保存</button>
          </div>
        </div>
        <!-- 搜索区域 -->
        <div class="friends-section">
          <button id="friends-scan-btn" class="friends-scan-btn" aria-label="搜索附近的好友"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:4px;margin-top:-2px"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>搜索附近的好友</button>
          <div id="friends-scan-status" class="friends-scan-status"></div>
        </div>
        <!-- 发现列表 -->
        <div class="friends-section">
          <div class="friends-section-title">发现的好友</div>
          <div id="friends-discovered-list" class="friends-list"></div>
        </div>
        <!-- 已添加好友 -->
        <div class="friends-section">
          <div class="friends-section-title">我的好友</div>
          <div id="friends-list" class="friends-list"></div>
        </div>
      </div>
    </div>

    <!-- 侧边面板底部工具栏 -->
    <div class="side-toolbar">
      <button class="side-tool-btn active" data-view="status" aria-label="状态"><svg class="side-tool-icon" width="20" height="20" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#FF6B9D"/></svg><span>状态</span></button>
      <button class="side-tool-btn" data-view="play" aria-label="玩耍"><svg class="side-tool-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg><span>玩耍</span></button>
      <button class="side-tool-btn" data-view="schedule" aria-label="日程"><svg class="side-tool-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>日程</span></button>
      <button class="side-tool-btn" data-view="todo" aria-label="待办"><svg class="side-tool-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span>待办</span></button>
      <button class="side-tool-btn" data-view="friends" aria-label="朋友"><svg class="side-tool-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg><span>朋友</span></button>
      <button class="side-tool-btn" data-view="settings" aria-label="设置"><svg class="side-tool-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>设置</span></button>
    </div>
  </aside>

  <!-- 右侧聊天区域 -->
  <div id="chat-app">
    <header id="chat-header">
      <div class="header-left">
        <button id="chat-back-btn" class="chat-back-btn hidden" aria-label="返回 Kitty 聊天"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="avatar-small"><img src="assets/avatar.jpeg" alt="HK"></div>
        <div class="header-info">
          <div class="header-name" id="chat-header-name">Hello Kitty</div>
          <div class="header-status" id="chat-header-status">在线 · 陪伴中</div>
        </div>
      </div>
      <button id="btn-close" class="close-btn" aria-label="关闭窗口"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </header>

    <div id="status-bar">
      <span class="status-item" id="status-mood">--</span>
      <span class="status-item" id="status-affinity">--</span>
      <span class="status-item" id="status-days">--</span>
    </div>

    <div id="message-list"></div>

    <div id="typing-indicator" class="hidden">
      <div class="typing-avatar"><img src="assets/avatar.jpeg" alt="HK"></div>
      <div class="typing-bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>

    <footer id="input-area">
      <input
        type="text"
        id="chat-input"
        placeholder="和 Kitty 说些什么..."
        autocomplete="off"
      />
      <button id="btn-send" aria-label="发送">发送</button>
    </footer>
  </div>

  </div> <!-- end of #app-wrapper -->

  <script src="icons.js"></script>
  <script src="skins.js"></script>
  <script src="chat.js"></script>
</body>
</html>
