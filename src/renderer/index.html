<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hello Kitty</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="pet-container">
    <div id="bubble-container" class="hidden">
      <div id="bubble-content"></div>
      <div id="bubble-input-wrap" class="hidden">
        <input id="bubble-input" type="text" placeholder="和 Kitty 说些什么...">
      </div>
      <div id="bubble-timer" class="hidden"></div>
      <div class="bubble-tail"></div>
    </div>
    <!-- 悬浮快捷聊天栏 -->
    <div id="quick-chat">
      <input id="quick-chat-input" type="text" placeholder="和 Kitty 说些什么..." autocomplete="off">
      <button id="quick-chat-send" class="quick-chat-btn" title="发送" aria-label="发送消息"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
      <button id="quick-chat-open" class="quick-chat-btn" title="打开聊天窗口" aria-label="打开聊天窗口"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></button>
    </div>
    <!-- 状态卡片 -->
    <div id="status-card" class="hidden">
      <div class="card-header">
        <span class="owner-name"></span>
        <span class="days-badge"></span>
      </div>
      <div class="card-body">
        <div class="status-row">
          <span class="status-label">心情</span>
          <div class="status-bar"><div class="bar-fill mood-fill"></div></div>
          <span class="status-value mood-value"></span>
        </div>
        <div class="status-row">
          <span class="status-label">亲密</span>
          <div class="status-bar"><div class="bar-fill affinity-fill"></div></div>
          <span class="status-value affinity-value"></span>
        </div>
      </div>
      <div class="card-footer">
        <span class="greeting-text"></span>
      </div>
    </div>
    <img id="gif-current" class="active" draggable="false">
    <img id="gif-next" draggable="false">
  </div>
  <script src="main.js"></script>
</body>
</html>
